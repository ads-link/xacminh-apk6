<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đang chuyển hướng...</title>

  <script>
    setTimeout(function () {
      window.location.href = "https://gaviet388.top";
    }, 2000);
  </script>

  <style>
    body{
      margin:0;
      min-height:100vh;
      background:#050505;
      font-family:Arial,sans-serif;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      text-align:center;
    }

    .loader{
      width:65px;
      height:65px;
      border:5px solid #444;
      border-top:5px solid #ffd000;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:0 auto;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    h2{
      margin-top:25px;
      font-size:30px;
    }

    p{
      color:#ccc;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="box">
  <div class="loader"></div>
  <h2>Đang chuyển hướng...</h2>
  <p>Tự động chuyển sau 3 giây</p>
</div>

</body>
</html>
